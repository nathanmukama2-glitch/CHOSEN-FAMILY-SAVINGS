<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Chosen Family Savings</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body { background-color: #f4f7f6; }
        .admin-card { background: #ffffff; border-radius: 15px; border-top: 5px solid #28a745; }
        .member-card { border: none; border-radius: 10px; box-shadow: 0 4px 6px rgba(0,0,0,0.1); }
    </style>
</head>
<body>

<div class="container py-4">
    <h2 class="text-center fw-bold mb-4">Group Savings Dashboard</h2>

    <div class="admin-card p-4 mb-5 shadow-sm">
        <h4 class="mb-3">Add Transaction</h4>
        <div class="row g-3">
            <div class="col-md-4">
                <label class="form-label">Member Name</label>
                <select id="name" class="form-select">
                    <option value="Nathan">Nathan</option>
                    <option value="Brian">Brian</option>
                    <option value="Shakirah">Shakirah</option>
                    <option value="Ashiraf">Ashiraf</option>
                    <option value="Fixer">Fixer</option>
                    <option value="Fadiga">Fadiga</option>
                    <option value="Tracy">Tracy</option>
                    <option value="Jackson">Jackson</option>
                </select>
            </div>
            <div class="col-md-3">
                <label class="form-label">Amount (UGX)</label>
                <input type="number" id="amt" class="form-control" placeholder="5000">
            </div>
            <div class="col-md-3">
                <label class="form-label">Type</label>
                <select id="type" class="form-select">
                    <option value="Savings">Savings</option>
                    <option value="Loan">Loan</option>
                </select>
            </div>
            <div class="col-md-2 d-flex align-items-end">
                <button onclick="sendData()" class="btn btn-success w-100">Submit</button>
            </div>
        </div>
        <button onclick="undo()" class="btn btn-link text-danger mt-3 p-0" style="text-decoration:none">Undo last entry</button>
    </div>

    <div id="display-area" class="row">
        <div class="text-center">Loading savings data...</div>
    </div>
</div>

<script>
    const url = 'https://script.google.com/macros/s/AKfycbwQyVLdXhheH2Ddfaqj8soep8a6bSu5yi4i3Cfl0kGPs9LbovqToKzche8eYgL1g5tX/exec'; // <--- PUT YOUR DEPLOYMENT URL HERE
    const goal = 50000;
    const members = ["Nathan", "Brian", "Shakirah", "Ashiraf", "Fixer", "Fadiga", "Tracy", "Jackson"];

    window.onload = getData;

    async function getData() {
        try {
            const res = await fetch(url);
            const data = await res.json();
            render(data);
        } catch (e) { document.getElementById('display-area').innerHTML = "Error loading data."; }
    }

    function render(data) {
        const area = document.getElementById('display-area');
        area.innerHTML = "";
        let totals = {};
        
        // Summing up logic
        for(let i=1; i<data.length; i++) {
            let n = data[i][1];
            let a = parseFloat(data[i][2]) || 0;
            if(n) totals[n] = (totals[n] || 0) + a;
        }

        members.forEach(m => {
            let s = totals[m] || 0;
            let r = Math.max(0, goal - s);
            area.innerHTML += `
                <div class="col-md-3 mb-3">
                    <div class="card member-card p-3">
                        <h5 class="fw-bold">${m}</h5>
                        <p class="mb-1">Saved: ${s.toLocaleString()} UGX</p>
                        <p class="small ${r === 0 ? 'text-success fw-bold' : 'text-danger'}">
                            ${r === 0 ? 'GOAL MET!' : 'Remaining: ' + r.toLocaleString()}
                        </p>
                    </div>
                </div>`;
        });
    }

    async function sendData() {
        const n = document.getElementById('name').value;
        const a = document.getElementById('amt').value;
        const t = document.getElementById('type').value;
        if(!a) return alert("Enter amount");

        await fetch(url, { method: 'POST', mode: 'no-cors', body: JSON.stringify({member: n, amount: a, type: t}) });
        alert("Saved!");
        location.reload();
    }

    async function undo() {
        if(confirm("Delete last entry?")) {
            await fetch(url + "?action=deleteLast");
            location.reload();
        }
    }
</script>
</body>
</html>
